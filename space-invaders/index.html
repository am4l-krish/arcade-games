<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/style.css">
  <link rel="stylesheet" href="./style.css">
  <title>SideQuest Arcade</title>
</head>
<body>
  <a href="../index.html" class="back-btn">← MENU</a>
  <video class="background-video" autoplay loop muted>
    <source src="../common/game-bg.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <!-- Background Music -->
  <audio id="background-music" loop>
    <source src="space.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <div class="board">
      <div class="game-area">
          <div id="grid"></div>
      </div>
      <div class="game-data">
          <h1>Space Invaders</h1>
          <p>Press the keys &#8592; and &#8594; to move the spaceship. <br> SPACE to shoot the aliens! </p>
          <h3>Score: <span id="score"></span></h3>
      </div>
  </div>

  <script src="../common/utils.js"></script>
  <script src="./script.js"></script>

  <script>
    window.onload = function() {
      backgroundMusic.play();
      musicButton.textContent = "Pause Music";
    };
  </script>
</body>
</html>
