<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SideQuest Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/style.css">
  <style>
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    h2 { animation: blink 1s infinite; }
    img.logo { animation: bounce 3s infinite; }

    .play-button, .music-button {
      margin-top: 20px;
      padding: 10px 20px;
      font-family: 'Press Start 2P', cursive;
      font-size: 16px;
      color: white;
      background-color: #060a0e;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0px 4px 6px rgba(15, 11, 11, 0.1);
    }
    .play-button:hover, .music-button:hover { background-color: #0e151c; }

    .container { text-align: center; position: relative; z-index: 1; }

    video.background-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Mobile warning */
    .mobile-warning {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      font-family: 'Press Start 2P', cursive;
      color: #00ffff;
      gap: 20px;
      font-size: 12px;
      line-height: 2;
    }
    @media (max-width: 600px) { .mobile-warning { display: flex; } }
  </style>
</head>
<body>

  <!-- Mobile Warning -->
  <div class="mobile-warning">
    <div style="font-size:48px">🕹️</div>
    <p>BEST PLAYED<br>ON DESKTOP!</p>
    <p style="font-size:9px;color:rgba(255,255,255,0.4)">Please open on a computer to play</p>
  </div>

  <!-- Video background -->
  <video class="background-video" autoplay loop muted>
    <source src="main-bg.mp4" type="video/mp4">
  </video>

  <div class="container">
    <img src="common/thumbs.png" alt="thumbs">
    <img src="common/logo.png" alt="Arcade Game Logo" class="logo">
    <h2>SELECT ANY GAME</h2>
    <br><br>

    <ul>
      <li><a href="tic-tac-toe/index.html">Tic Tac Toe</a></li>
      <li><a href="memory-game/index.html">Memory Game</a></li>
      <li><a href="whack-a-bug/index.html">Whack a Bug</a></li>
      <li><a href="running-duck/index.html">Running Duck</a></li>
      <li><a href="space-invaders/index.html">Space Invaders</a></li>
    </ul>
  </div>

  <audio id="backgroundMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <center>
    <button class="music-button" id="musicBtn">🎵 Play Music</button>
  </center>

  <script>
    const music = document.getElementById("backgroundMusic");
    const musicBtn = document.getElementById("musicBtn");
    let isPlaying = false;
    musicBtn.addEventListener("click", function() {
      if (isPlaying) { music.pause(); musicBtn.textContent = "🎵 Play Music"; }
      else { music.play(); musicBtn.textContent = "⏸ Pause Music"; }
      isPlaying = !isPlaying;
    });
  </script>
</body>
</html>
